name: "Guard Agent"
description: "Guard IoT remote management agent — network scanning, file management, shell execution, integration control, telemetry."
version: "1.0.0"
slug: guard-agent
url: "https://github.com/jufusius/guard-ha-addons"

arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386

startup: services
boot: auto
init: false

# Network — host_network pro ARP scan, Tuya UDP, ping sweep
# Port 8300 = Guard Agent REST API (přístupný přes Cloudflare tunnel)
host_network: true
ports:
  "8300/tcp": 8300
ports_description:
  "8300/tcp": "Guard Agent REST API"

# Permissions — plný přístup k Supervisor, HA Core, filesystem
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: false
docker_api: false

# Filesystem — read/write HA config (/homeassistant v kontejneru)
map:
  - homeassistant_config:rw
  - share:rw
  - addon_config:rw

# Capabilities — raw sockets pro ping/ARP
privileged:
  - NET_RAW
  - NET_ADMIN

# Configuration
options:
  api_key: ""
  server_url: "https://mcp.jufusi.us"
  scan_interval: 30
  tuya_scan: true
schema:
  api_key: str
  server_url: url
  scan_interval: "int(5,1440)"
  tuya_scan: bool
